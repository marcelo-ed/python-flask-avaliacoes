{% extends 'base.html' %}

{% block title %}Novo Item{% endblock %}

{% block content %}

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
    }

    .container {
        width: 350px;
        margin: 50px auto;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
    }

    input, select, textarea {
        width: 100%;
        padding: 8px;
        margin-top: 10px;
        border-radius: 4px;
        border: 1px solid #ccc;
    }

    textarea {
        resize: none;
        height: 100px;
    }

    button {
        width: 100%;
        margin-top: 15px;
        padding: 10px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    button:hover {
        background-color: #1e7e34;
    }
</style>

<div class="container">
    <h2>Novo Item</h2>

    <form method="POST">
        <input type="text" name="titulo" placeholder="Título" required>

        <input type="number" name="ano" placeholder="Ano">

        <select name="tipo">
            <option value="filme">Filme</option>
            <option value="livro">Livro</option>
        </select>

        <textarea name="descricao" placeholder="Descrição"></textarea>

        <button type="submit">Salvar</button>
    </form>
</div>

{% endblock %}
