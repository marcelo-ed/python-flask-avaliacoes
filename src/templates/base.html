<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sistema de Avaliações{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        nav {
            background-color: #333;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-weight: bold;
        }

        nav a:hover {
            color: #00bfff;
        }

        hr {
            margin: 0;
            border: none;
            height: 2px;
            background-color: #ddd;
        }

        .content {
            padding: 20px;
        }
    </style>
</head>

<body>
    <nav>
        <a href="{{ url_for('main.home') }}">Home</a>
        <a href="{{ url_for('main.catalogo') }}">Catálogo</a>
    
        {% if session.get('usuario_id') %}
            <a href="{{ url_for('main.logout') }}">Logout</a>
        {% else %}
            <a href="{{ url_for('main.login') }}">Login</a>
            <a href="{{ url_for('main.registrar') }}">Registrar</a>
        {% endif %}
    </nav>

    <hr>

    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>

</html>
