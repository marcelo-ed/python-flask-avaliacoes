{% extends 'base.html' %}

{% block title %}Editar Item{% endblock %}

{% block content %}

<style>
    .container {
        width: 400px;
        margin: 40px auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    input, select, textarea {
        width: 100%;
        padding: 8px;
        margin-top: 10px;
        border-radius: 4px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        margin-top: 15px;
        padding: 10px;
        background-color: #ffc107;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    button:hover {
        background-color: #e0a800;
    }
</style>

<div class="container">
    <h2>Editar {{ item.titulo }}</h2>

    <form method="POST">
        <input type="text" name="titulo" value="{{ item.titulo }}" required>

        <input type="number" name="ano" value="{{ item.ano }}">

        <select name="tipo">
            <option value="filme" {% if item.tipo == 'filme' %}selected{% endif %}>Filme</option>
            <option value="livro" {% if item.tipo == 'livro' %}selected{% endif %}>Livro</option>
        </select>

        <textarea name="descricao">{{ item.descricao }}</textarea>

        <button type="submit">Salvar Alterações</button>
    </form>
</div>

{% endblock %}
