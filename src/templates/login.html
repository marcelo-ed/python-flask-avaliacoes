{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
    }

    .container {
        width: 320px;
        margin: 60px auto;
        padding: 25px;
        background: white;
        border-radius: 8px;
        box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
        text-align: left;
    }

    input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 4px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        margin-top: 20px;
        padding: 10px;
        background-color: #007BFF;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    button:hover {
        background-color: #0056b3;
    }

    .link-btn {
        display: block;
        margin-top: 15px;
        text-decoration: none;
        color: #007BFF;
        font-size: 14px;
    }

    .link-btn:hover {
        text-decoration: underline;
    }
</style>

<div class="container">
    <h2>Login</h2>

    <form method="POST">
        <label>Email:</label>
        <input type="email" name="email" required>

        <label>Senha:</label>
        <input type="password" name="senha" required>

        <button type="submit">Entrar</button>
    </form>

    <a class="link-btn" href="{{ url_for('main.registrar') }}">
        Não tenho uma conta
    </a>
</div>

{% endblock %}
