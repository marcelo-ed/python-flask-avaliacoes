{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<style>
    .container {
        width: 300px;
        margin: 50px auto;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
    }

    label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 4px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        margin-top: 15px;
        padding: 10px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        display: block;
        color: white;
        font-size: 14px;
    }

    button {
        background-color: #007BFF;
    }

    button:hover {
        background-color: #0056b3;
    }

    .link-btn {
        display: block;
        margin-top: 15px;
        text-decoration: none;
        color: #007BFF;
        font-size: 14px;
        text-align: center;
    }
</style>

<div class="container">
    <h2>Registrar</h2>

    <form method="POST">
        <label>Nome:</label>
        <input type="text" name="nome" required>

        <label>Idade:</label>
        <input type="number" name="idade" required>
        
        <label>Email:</label>
        <input type="email" name="email" required>

        <label>Senha:</label>
        <input type="password" name="senha" required>

        <button type="submit">Registrar</button>
    </form>

    <!-- BOTÃO CADASTRAR -->
    <a class="link-btn" href="{{ url_for('main.login') }}">
        Já tenho uma conta
    </a>
</div>

{% endblock %}
